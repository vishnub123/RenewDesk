<!-- FULL UPDATED SVG -->
<!-- Improvements: spacing + smoother animation + glow -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&amp;display=swap');

      /* Pulse rings */
      .ring1 { animation: ring-pulse 2.5s ease-in-out infinite; transform-origin: 200px 200px; }
      .ring2 { animation: ring-pulse 2.5s ease-in-out infinite 0.4s; transform-origin: 200px 200px; }
      .ring3 { animation: ring-pulse 2.5s ease-in-out infinite 0.8s; transform-origin: 200px 200px; }

      @keyframes ring-pulse {
        0%   { opacity: 0; r: 60px; }
        30%  { opacity: 0.35; }
        100% { opacity: 0; r: 130px; }
      }

      /* Smooth bell swing */
      .bell-group {
        animation: bell-sway 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        transform-origin: 200px 185px;
      }

      @keyframes bell-sway {
        0%,100% { transform: rotate(0deg); }
        15%     { transform: rotate(10deg); }
        30%     { transform: rotate(-8deg); }
        45%     { transform: rotate(6deg); }
        60%     { transform: rotate(-4deg); }
        75%     { transform: rotate(2deg); }
      }

      /* Glow pulse */
      .bell-glow {
        animation: glow-pulse 2s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%,100% { opacity: 0.6; }
        50%     { opacity: 1; }
      }

      /* Badge pop */
      .badge { animation: badge-pop 3s ease-in-out infinite; transform-origin: 242px 158px; }

      @keyframes badge-pop {
        0%,100% { transform: scale(1); }
        20%     { transform: scale(1.25); }
        40%     { transform: scale(0.95); }
        60%     { transform: scale(1.1); }
        80%     { transform: scale(1); }
      }

      /* Fade up text */
      .title-text  { animation: fade-up 0.9s ease forwards; opacity: 0; }
      .sub-text    { animation: fade-up 0.9s ease 0.3s forwards; opacity: 0; }
      .badge-row   { animation: fade-up 0.9s ease 0.6s forwards; opacity: 0; }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Dot animation */
      .dot1 { animation: blink 1.6s infinite; }
      .dot2 { animation: blink 1.6s infinite 0.3s; }
      .dot3 { animation: blink 1.6s infinite 0.6s; }

      @keyframes blink {
        0%,100% { opacity: 0.2; }
        50%     { opacity: 1; }
      }
    </style>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Background -->
    <linearGradient id="bg">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#071410"/>
    </linearGradient>

    <!-- Bell gradient -->
    <linearGradient id="bellGrad">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Rings -->
  <circle class="ring1" cx="200" cy="200" r="60" stroke="#10b981" fill="none"/>
  <circle class="ring2" cx="200" cy="200" r="60" stroke="#10b981" fill="none"/>
  <circle class="ring3" cx="200" cy="200" r="60" stroke="#10b981" fill="none"/>

  <!-- Bell circle -->
  <circle cx="200" cy="200" r="56" fill="#0d1117" stroke="#10b981"/>

  <!-- Bell -->
  <g class="bell-group bell-glow" filter="url(#glow)">
    <path d="M200 158 C185 158 172 170 172 185 L172 207 L164 218 L236 218 L228 207 L228 185 C228 170 215 158 200 158Z"
          fill="url(#bellGrad)"/>
    <rect x="162" y="214" width="76" height="8" rx="4" fill="url(#bellGrad)"/>
    <circle cx="200" cy="228" r="6" fill="#34d399"/>
  </g>

  <!-- Badge -->
  <g class="badge">
    <circle cx="242" cy="158" r="16" fill="#059669"/>
  </g>

  <!-- ✅ FIXED Divider (shifted right) -->
  <line x1="360" y1="120" x2="360" y2="280"
        stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <!-- Title -->
  <text x="700" y="180" text-anchor="middle"
        font-family="DM Sans" font-size="72" fill="white">RenewDesk</text>

  <!-- Subtitle -->
  <text x="700" y="230" text-anchor="middle"
        font-family="DM Sans" font-size="22" fill="#a7f3d0">
        Smart Subscription & Payment Tracker
  </text>

</svg>