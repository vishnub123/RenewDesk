<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&amp;display=swap');

      /* Pulse ring */
      .ring1 { animation: ring-pulse 2.5s ease-in-out infinite; transform-origin: 200px 200px; }
      .ring2 { animation: ring-pulse 2.5s ease-in-out infinite 0.4s; transform-origin: 200px 200px; }
      .ring3 { animation: ring-pulse 2.5s ease-in-out infinite 0.8s; transform-origin: 200px 200px; }
      @keyframes ring-pulse {
        0%   { opacity: 0; r: 60px; }
        30%  { opacity: 0.35; }
        100% { opacity: 0; r: 130px; }
      }

      /* Bell sway */
      .bell-group { animation: bell-sway 3s ease-in-out infinite; transform-origin: 200px 185px; }
      @keyframes bell-sway {
        0%,100% { transform: rotate(0deg); }
        20%     { transform: rotate(12deg); }
        40%     { transform: rotate(-10deg); }
        60%     { transform: rotate(7deg); }
        80%     { transform: rotate(-5deg); }
      }

      /* Badge pop */
      .badge { animation: badge-pop 3s ease-in-out infinite; transform-origin: 242px 158px; }
      @keyframes badge-pop {
        0%,100% { transform: scale(1); }
        20%     { transform: scale(1.25); }
        40%     { transform: scale(0.95); }
        60%     { transform: scale(1.1); }
        80%     { transform: scale(1); }
      }

      /* Text fade-up */
      .title-text  { animation: fade-up 0.9s ease forwards; opacity: 0; }
      .sub-text    { animation: fade-up 0.9s ease 0.3s forwards; opacity: 0; }
      .badge-row   { animation: fade-up 0.9s ease 0.6s forwards; opacity: 0; }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Dot blink */
      .dot1 { animation: blink 1.6s ease-in-out infinite 0s; }
      .dot2 { animation: blink 1.6s ease-in-out infinite 0.3s; }
      .dot3 { animation: blink 1.6s ease-in-out infinite 0.6s; }
      @keyframes blink {
        0%,100% { opacity: 0.2; }
        50%     { opacity: 1; }
      }

      /* Shimmer line */
      .shimmer { animation: shimmer 3s linear infinite; }
      @keyframes shimmer {
        0%   { transform: translateX(-200px); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateX(700px); opacity: 0; }
      }
    </style>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle gradient bg -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0f1a"/>
      <stop offset="50%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#071410"/>
    </linearGradient>

    <!-- Green gradient for bell -->
    <linearGradient id="bellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Shimmer gradient -->
    <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="shimmerClip">
      <rect x="480" y="160" width="640" height="2"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.07">
    <circle cx="80"  cy="60"  r="1.5" fill="#10b981"/>
    <circle cx="200" cy="40"  r="1.5" fill="#10b981"/>
    <circle cx="320" cy="80"  r="1.5" fill="#10b981"/>
    <circle cx="440" cy="50"  r="1.5" fill="#10b981"/>
    <circle cx="900" cy="60"  r="1.5" fill="#10b981"/>
    <circle cx="1020" cy="40" r="1.5" fill="#10b981"/>
    <circle cx="1140" cy="80" r="1.5" fill="#10b981"/>
    <circle cx="1200" cy="340" r="1.5" fill="#10b981"/>
    <circle cx="80"  cy="340" r="1.5" fill="#10b981"/>
    <circle cx="160" cy="360" r="1.5" fill="#10b981"/>
    <circle cx="1100" cy="360" r="1.5" fill="#10b981"/>
    <circle cx="1260" cy="300" r="1.5" fill="#10b981"/>
    <circle cx="20"  cy="200" r="1.5" fill="#10b981"/>
    <circle cx="1260" cy="200" r="1.5" fill="#10b981"/>
  </g>

  <!-- Left green glow blob -->
  <ellipse cx="160" cy="200" rx="160" ry="160" fill="#10b981" opacity="0.04"/>

  <!-- Pulse rings behind bell -->
  <circle class="ring1" cx="200" cy="200" r="60" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <circle class="ring2" cx="200" cy="200" r="60" fill="none" stroke="#10b981" stroke-width="1"/>
  <circle class="ring3" cx="200" cy="200" r="60" fill="none" stroke="#10b981" stroke-width="0.5"/>

  <!-- Icon background circle -->
  <circle cx="200" cy="200" r="56" fill="#0d1117" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>

  <!-- Bell group (swaying) -->
  <g class="bell-group" filter="url(#glow)">
    <!-- Bell body -->
    <path d="M200 158 C185 158 172 170 172 185 L172 207 L164 218 L236 218 L228 207 L228 185 C228 170 215 158 200 158Z"
          fill="url(#bellGrad)"/>
    <!-- Bell bottom bar -->
    <rect x="162" y="214" width="76" height="8" rx="4" fill="url(#bellGrad)"/>
    <!-- Clapper -->
    <circle cx="200" cy="228" r="6" fill="#34d399"/>
  </g>

  <!-- Badge (pop animation) -->
  <g class="badge">
    <circle cx="242" cy="158" r="16" fill="#0d1117" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="242" cy="158" r="13" fill="#059669"/>
    <!-- Check mark -->
    <path d="M236 158 L240 162 L249 152" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Divider line -->
  <line x1="310" y1="120" x2="310" y2="280" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <!-- Shimmer line across text area -->
  <g clip-path="url(#shimmerClip)">
    <rect class="shimmer" x="480" y="160" width="200" height="2" fill="url(#shimmerGrad)"/>
  </g>

  <!-- App Name -->
  <g class="title-text">
    <text x="660" y="185"
          text-anchor="middle"
          font-family="DM Sans, Segoe UI, sans-serif"
          font-size="72"
          font-weight="800"
          fill="#ffffff"
          letter-spacing="-1">RenewDesk</text>
  </g>

  <!-- Tagline -->
  <g class="sub-text">
    <text x="660" y="232"
          text-anchor="middle"
          font-family="DM Sans, Segoe UI, sans-serif"
          font-size="22"
          font-weight="400"
          fill="#a7f3d0"
          letter-spacing="0.5">Smart Subscription &amp; Payment Tracker</text>
  </g>

  <!-- Animated dots -->
  <g class="sub-text">
    <circle class="dot1" cx="582" cy="258" r="4" fill="#10b981"/>
    <circle class="dot2" cx="600" cy="258" r="4" fill="#10b981"/>
    <circle class="dot3" cx="618" cy="258" r="4" fill="#10b981"/>

    <text x="640" y="263"
          font-family="DM Sans, Segoe UI, sans-serif"
          font-size="14"
          font-weight="400"
          fill="#6ee7b7"
          letter-spacing="0.5">Gyms · PGs · Coaching · Sports Clubs</text>
  </g>

  <!-- Badge row -->
  <g class="badge-row">
    <!-- Badge 1 -->
    <rect x="490" y="290" width="110" height="30" rx="15" fill="#0d2818" stroke="#10b981" stroke-width="1"/>
    <text x="545" y="310" text-anchor="middle"
          font-family="DM Sans, Segoe UI, sans-serif"
          font-size="13" font-weight="600" fill="#10b981">React 18</text>

    <!-- Badge 2 -->
    <rect x="614" y="290" width="90" height="30" rx="15" fill="#0d1a2e" stroke="#646cff" stroke-width="1"/>
    <text x="659" y="310" text-anchor="middle"
          font-family="DM Sans, Segoe UI, sans-serif"
          font-size="13" font-weight="600" fill="#818cf8">Vite 5</text>

    <!-- Badge 3 -->
    <rect x="718" y="290" width="130" height="30" rx="15" fill="#0a1f0a" stroke="#25D366" stroke-width="1"/>
    <text x="783" y="310" text-anchor="middle"
          font-family="DM Sans, Segoe UI, sans-serif"
          font-size="13" font-weight="600" fill="#25D366">WhatsApp</text>

    <!-- Badge 4 -->
    <rect x="862" y="290" width="100" height="30" rx="15" fill="#1a1a1a" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
    <text x="912" y="310" text-anchor="middle"
          font-family="DM Sans, Segoe UI, sans-serif"
          font-size="13" font-weight="600" fill="#ffffff">Vercel</text>
  </g>

  <!-- Bottom green line accent -->
  <rect x="0" y="396" width="1280" height="4" fill="#10b981" opacity="0.6"/>

</svg>